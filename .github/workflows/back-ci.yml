name: back-ci-cd

on:
  push:
    branches:
      - back
  pull_request:
    branches:
      - back
  workflow_dispatch:

concurrency:
  group: back-production
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast3
  REPOSITORY: icore
  API_IMAGE_NAME: icore-api
  WORKER_IMAGE_NAME: icore-g2b-worker
  CLOUD_RUN_API_SERVICE: icore-api
  CLOUD_RUN_WORKER_SERVICE: icore-g2b-worker
  CLOUD_SCHEDULER_LOCATION: asia-northeast3
  OPENING_RESULTS_SCHEDULER_JOB_ID: icore-g2b-opening-results-12h
  NOTICE_ENRICHMENT_SCHEDULER_JOB_ID: icore-g2b-notice-enrichment

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        run: python -c "import main; print(main.app.title)"

      - name: Run backend tests
        run: python -m unittest discover -s tests -p 'test_*.py'

      - name: Build API image without publishing
        run: docker build -t icore-api:ci .

      - name: Build worker image without publishing
        run: docker build -f Dockerfile.cloudrun-scraper -t icore-g2b-worker:ci .

      - name: Validate production deploy configuration
        if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SCRAPER_INTERNAL_TOKEN: ${{ secrets.SCRAPER_INTERNAL_TOKEN }}
          G2B_AWARD_SERVICE_KEY: ${{ secrets.G2B_AWARD_SERVICE_KEY }}
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          GSHEET_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GSHEET_SERVICE_ACCOUNT_EMAIL }}
        run: |
          set -euo pipefail
          required=(
            PROJECT_ID GCP_SA_KEY DATABASE_URL AUTH_SECRET_KEY DEFAULT_ADMIN_PASSWORD
            GOOGLE_OAUTH_CLIENT_ID CORS_ALLOWED_ORIGINS SCRAPER_INTERNAL_TOKEN
            G2B_AWARD_SERVICE_KEY GSHEET_SERVICE_ACCOUNT_JSON
            GSHEET_SERVICE_ACCOUNT_EMAIL
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "$name must be configured before production deployment."
              exit 1
            fi
          done
          if [ "${#AUTH_SECRET_KEY}" -lt 32 ]; then
            echo "AUTH_SECRET_KEY must contain at least 32 characters."
            exit 1
          fi
          if [ "${#DEFAULT_ADMIN_PASSWORD}" -lt 12 ]; then
            echo "DEFAULT_ADMIN_PASSWORD must contain at least 12 characters."
            exit 1
          fi
          if [ "${#SCRAPER_INTERNAL_TOKEN}" -lt 32 ]; then
            echo "SCRAPER_INTERNAL_TOKEN must contain at least 32 characters."
            exit 1
          fi
          case "$GOOGLE_OAUTH_CLIENT_ID" in
            *.apps.googleusercontent.com) ;;
            *)
              echo "GOOGLE_OAUTH_CLIENT_ID is not a Google web client ID."
              exit 1
              ;;
          esac
          if ! jq -e '.type == "service_account" and (.client_email | length > 0)' \
            <<<"$GSHEET_SERVICE_ACCOUNT_JSON" >/dev/null; then
            echo "GSHEET_SERVICE_ACCOUNT_JSON is not a service-account JSON object."
            exit 1
          fi
          if ! jq -e \
            --arg expected "github-deployer@${PROJECT_ID}.iam.gserviceaccount.com" \
            '.type == "service_account" and .client_email == $expected' \
            <<<"$GCP_SA_KEY" >/dev/null; then
            echo "GCP_SA_KEY must belong to the github-deployer service account."
            exit 1
          fi
          for value in \
            "$DATABASE_URL" "$AUTH_SECRET_KEY" "$DEFAULT_ADMIN_PASSWORD" \
            "$GOOGLE_OAUTH_CLIENT_ID" "$CORS_ALLOWED_ORIGINS" \
            "$SCRAPER_INTERNAL_TOKEN" "$G2B_AWARD_SERVICE_KEY" \
            "$GSHEET_SERVICE_ACCOUNT_JSON" "$GSHEET_SERVICE_ACCOUNT_EMAIL"; do
            if [[ "$value" == *"~"* ]]; then
              echo "A deployment value contains the reserved '~' delimiter."
              exit 1
            fi
          done

      - name: Authenticate to Google Cloud
        if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          printf '%s' "$GCP_SA_KEY" | docker login \
            -u _json_key \
            --password-stdin \
            "https://${{ env.GAR_LOCATION }}-docker.pkg.dev"

      - name: Push API and worker images
        if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
        run: |
          set -euo pipefail
          API_IMAGE=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.API_IMAGE_NAME }}
          WORKER_IMAGE=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.WORKER_IMAGE_NAME }}
          docker tag icore-api:ci "$API_IMAGE:${{ github.sha }}"
          docker tag icore-api:ci "$API_IMAGE:latest"
          docker tag icore-g2b-worker:ci "$WORKER_IMAGE:${{ github.sha }}"
          docker tag icore-g2b-worker:ci "$WORKER_IMAGE:latest"
          docker push "$API_IMAGE:${{ github.sha }}"
          docker push "$API_IMAGE:latest"
          docker push "$WORKER_IMAGE:${{ github.sha }}"
          docker push "$WORKER_IMAGE:latest"

  deploy-api:
    needs: test-and-build
    if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy API to Cloud Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}
          DEFAULT_ADMIN_PASSWORD: ${{ secrets.DEFAULT_ADMIN_PASSWORD }}
          DEFAULT_ADMIN_EMAIL: ${{ secrets.DEFAULT_ADMIN_EMAIL }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          SCRAPER_INTERNAL_TOKEN: ${{ secrets.SCRAPER_INTERNAL_TOKEN }}
          G2B_AWARD_SERVICE_KEY: ${{ secrets.G2B_AWARD_SERVICE_KEY }}
          G2B_AWARD_SOURCE_URL: ${{ secrets.G2B_AWARD_SOURCE_URL }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          GSHEET_SERVICE_ACCOUNT_JSON: ${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}
          GSHEET_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GSHEET_SERVICE_ACCOUNT_EMAIL }}
        run: |
          set -euo pipefail
          SHORT_SHA=${GITHUB_SHA::8}
          CANDIDATE_TAG="api-candidate-$SHORT_SHA"
          API_IMAGE=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.API_IMAGE_NAME }}
          SERVICE_JSON=$(gcloud run services describe "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format=json)
          API_URL=$(jq -r '.status.url' <<<"$SERVICE_JSON")
          PREVIOUS_REVISION=$(jq -r '.status.traffic[] | select(.percent == 100) | .revisionName' <<<"$SERVICE_JSON" | head -1)
          if [ -z "$API_URL" ]; then
            echo "Existing Cloud Run API URL could not be resolved."
            exit 1
          fi
          OPENING_RESULTS_TARGET="$API_URL/api/v1/results/internal/collect"
          SCHEDULER_SERVICE_ACCOUNT="icore-scheduler@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

          gcloud run deploy "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --platform=managed \
            --allow-unauthenticated \
            --image="$API_IMAGE:${{ github.sha }}" \
            --service-account="icore-api@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --add-cloudsql-instances="${{ env.PROJECT_ID }}:${{ env.GAR_LOCATION }}:icore-mysql" \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=1800 \
            --no-traffic \
            --tag="$CANDIDATE_TAG" \
            --update-env-vars "^~^ENVIRONMENT=production~DATABASE_URL=$DATABASE_URL~AUTH_SECRET_KEY=$AUTH_SECRET_KEY~DEFAULT_ADMIN_PASSWORD=$DEFAULT_ADMIN_PASSWORD~DEFAULT_ADMIN_EMAIL=$DEFAULT_ADMIN_EMAIL~LEGACY_PASSWORD_LOGIN_ENABLED=false~SINGLE_USER_MODE_ENABLED=false~GOOGLE_OAUTH_CLIENT_ID=$GOOGLE_OAUTH_CLIENT_ID~ALLOWED_LOGIN_DOMAINS=iceu.kr,iceu.co.kr~CORS_ALLOWED_ORIGINS=$CORS_ALLOWED_ORIGINS~SCRAPER_INTERNAL_TOKEN=$SCRAPER_INTERNAL_TOKEN~G2B_AWARD_SERVICE_KEY=$G2B_AWARD_SERVICE_KEY~G2B_AWARD_SOURCE_URL=$G2B_AWARD_SOURCE_URL~G2B_AWARD_SCHEDULER_TARGET_URL=$OPENING_RESULTS_TARGET~G2B_AWARD_SCHEDULER_OIDC_AUDIENCE=$API_URL~CLOUD_SCHEDULER_INVOKER_SERVICE_ACCOUNT=$SCHEDULER_SERVICE_ACCOUNT~GSHEET_ID=$GSHEET_ID~GSHEET_OPENING_RESULT_ID=$GSHEET_ID~GSHEET_SERVICE_ACCOUNT_JSON=$GSHEET_SERVICE_ACCOUNT_JSON~GSHEET_SERVICE_ACCOUNT_EMAIL=$GSHEET_SERVICE_ACCOUNT_EMAIL" \
            --quiet

          CANDIDATE_JSON=$(gcloud run services describe "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format=json)
          CANDIDATE_URL=$(jq -r --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .url' <<<"$CANDIDATE_JSON")
          NEW_REVISION=$(jq -r --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .revisionName' <<<"$CANDIDATE_JSON")
          if [ -z "$CANDIDATE_URL" ] || [ -z "$NEW_REVISION" ]; then
            echo "Candidate API revision could not be resolved."
            exit 1
          fi
          for _ in $(seq 1 30); do
            if curl --fail --silent "$CANDIDATE_URL/api/health" >/dev/null; then
              candidate_healthy=true
              break
            fi
            sleep 2
          done
          if [ "${candidate_healthy:-false}" != "true" ]; then
            gcloud run services logs read "${{ env.CLOUD_RUN_API_SERVICE }}" \
              --project="${{ env.PROJECT_ID }}" \
              --region="${{ env.GAR_LOCATION }}" \
              --limit=50 || true
            exit 1
          fi

          gcloud run services update-traffic "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --to-revisions="$NEW_REVISION=100" \
            --quiet
          for _ in $(seq 1 15); do
            if curl --fail --silent "$API_URL/api/health" >/dev/null; then
              stable_healthy=true
              break
            fi
            sleep 2
          done
          if [ "${stable_healthy:-false}" != "true" ]; then
            if [ -n "$PREVIOUS_REVISION" ]; then
              gcloud run services update-traffic "${{ env.CLOUD_RUN_API_SERVICE }}" \
                --project="${{ env.PROJECT_ID }}" \
                --region="${{ env.GAR_LOCATION }}" \
                --to-revisions="$PREVIOUS_REVISION=100" \
                --quiet
            fi
            exit 1
          fi

      - name: Configure and verify opening results scheduler
        env:
          INTERNAL_TOKEN: ${{ secrets.SCRAPER_INTERNAL_TOKEN }}
        run: |
          set -euo pipefail
          API_URL=$(gcloud run services describe "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format='value(status.url)')
          TARGET_URL="$API_URL/api/v1/results/internal/collect"
          INVOKER_SERVICE_ACCOUNT="icore-scheduler@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          EXPECTED_SCHEDULE="0 8,11,14,17 * * *"
          EXPECTED_TIME_ZONE="Asia/Seoul"

          gcloud run services add-iam-policy-binding "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --member="serviceAccount:$INVOKER_SERVICE_ACCOUNT" \
            --role="roles/run.invoker" \
            --quiet

          common_args=(
            --project="${{ env.PROJECT_ID }}"
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}"
            --schedule="$EXPECTED_SCHEDULE"
            --time-zone="$EXPECTED_TIME_ZONE"
            --uri="$TARGET_URL"
            --http-method=POST
            --message-body='{}'
            --oidc-service-account-email="$INVOKER_SERVICE_ACCOUNT"
            --oidc-token-audience="$API_URL"
            --attempt-deadline=30m
            --max-retry-attempts=3
            --min-backoff=60s
            --max-backoff=600s
            --max-doublings=3
          )
          if gcloud scheduler jobs describe "${{ env.OPENING_RESULTS_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${{ env.OPENING_RESULTS_SCHEDULER_JOB_ID }}" \
              "${common_args[@]}" \
              --update-headers="Content-Type=application/json,X-Scraper-Internal-Token=$INTERNAL_TOKEN"
          else
            gcloud scheduler jobs create http "${{ env.OPENING_RESULTS_SCHEDULER_JOB_ID }}" \
              "${common_args[@]}" \
              --headers="Content-Type=application/json,X-Scraper-Internal-Token=$INTERNAL_TOKEN"
          fi

          gcloud scheduler jobs resume "${{ env.OPENING_RESULTS_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" || true

          actual=$(gcloud scheduler jobs describe "${{ env.OPENING_RESULTS_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" \
            --format=json | jq -r '[.schedule, .timeZone, .state, .httpTarget.uri, .httpTarget.httpMethod, .httpTarget.oidcToken.serviceAccountEmail, .httpTarget.oidcToken.audience] | join(" ")')
          expected="$EXPECTED_SCHEDULE $EXPECTED_TIME_ZONE ENABLED $TARGET_URL POST $INVOKER_SERVICE_ACCOUNT $API_URL"
          if [ "$actual" != "$expected" ]; then
            echo "Opening results scheduler verification failed."
            exit 1
          fi

          ENRICHMENT_TARGET_URL="$API_URL/api/v1/results/internal/enrich-context"
          ENRICHMENT_SCHEDULE="10 8,11,14,17 * * *"
          enrichment_args=(
            --project="${{ env.PROJECT_ID }}"
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}"
            --schedule="$ENRICHMENT_SCHEDULE"
            --time-zone="$EXPECTED_TIME_ZONE"
            --uri="$ENRICHMENT_TARGET_URL"
            --http-method=POST
            --message-body='{}'
            --oidc-service-account-email="$INVOKER_SERVICE_ACCOUNT"
            --oidc-token-audience="$API_URL"
            --attempt-deadline=10m
            --max-retry-attempts=1
            --min-backoff=60s
            --max-backoff=300s
            --max-doublings=2
          )
          if gcloud scheduler jobs describe "${{ env.NOTICE_ENRICHMENT_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "${{ env.NOTICE_ENRICHMENT_SCHEDULER_JOB_ID }}" \
              "${enrichment_args[@]}" \
              --update-headers="Content-Type=application/json,X-Scraper-Internal-Token=$INTERNAL_TOKEN"
          else
            gcloud scheduler jobs create http "${{ env.NOTICE_ENRICHMENT_SCHEDULER_JOB_ID }}" \
              "${enrichment_args[@]}" \
              --headers="Content-Type=application/json,X-Scraper-Internal-Token=$INTERNAL_TOKEN"
          fi

          gcloud scheduler jobs resume "${{ env.NOTICE_ENRICHMENT_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" || true

          enrichment_actual=$(gcloud scheduler jobs describe "${{ env.NOTICE_ENRICHMENT_SCHEDULER_JOB_ID }}" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" \
            --format=json | jq -r '[.schedule, .timeZone, .state, .httpTarget.uri, .httpTarget.httpMethod, .httpTarget.oidcToken.serviceAccountEmail, .httpTarget.oidcToken.audience] | join(" ")')
          enrichment_expected="$ENRICHMENT_SCHEDULE $EXPECTED_TIME_ZONE ENABLED $ENRICHMENT_TARGET_URL POST $INVOKER_SERVICE_ACCOUNT $API_URL"
          if [ "$enrichment_actual" != "$enrichment_expected" ]; then
            echo "Notice enrichment scheduler verification failed."
            exit 1
          fi

  deploy-worker:
    needs: test-and-build
    if: vars.GCP_DEPLOY_ENABLED == 'true' && ((github.event_name == 'push' && github.ref == 'refs/heads/back') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy worker to Cloud Run
        env:
          SCRAPER_INTERNAL_TOKEN: ${{ secrets.SCRAPER_INTERNAL_TOKEN }}
        run: |
          set -euo pipefail
          SHORT_SHA=${GITHUB_SHA::8}
          CANDIDATE_TAG="worker-candidate-$SHORT_SHA"
          WORKER_IMAGE=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.WORKER_IMAGE_NAME }}
          API_URL=$(gcloud run services describe "${{ env.CLOUD_RUN_API_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format='value(status.url)')
          SERVICE_JSON=$(gcloud run services describe "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format=json)
          PREVIOUS_REVISION=$(jq -r '.status.traffic[] | select(.percent == 100) | .revisionName' <<<"$SERVICE_JSON" | head -1)
          gcloud run services add-iam-policy-binding "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --member="serviceAccount:github-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --role="roles/run.invoker" \
            --quiet
          gcloud run deploy "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --platform=managed \
            --image="$WORKER_IMAGE:${{ github.sha }}" \
            --service-account="icore-worker@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --no-traffic \
            --tag="$CANDIDATE_TAG" \
            --update-env-vars "^~^BACKEND_INTERNAL_BASE_URL=$API_URL~SCRAPER_INTERNAL_TOKEN=$SCRAPER_INTERNAL_TOKEN" \
            --quiet

          CANDIDATE_JSON=$(gcloud run services describe "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format=json)
          WORKER_URL=$(jq -r '.status.url' <<<"$CANDIDATE_JSON")
          CANDIDATE_URL=$(jq -r --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .url' <<<"$CANDIDATE_JSON")
          NEW_REVISION=$(jq -r --arg tag "$CANDIDATE_TAG" '.status.traffic[] | select(.tag == $tag) | .revisionName' <<<"$CANDIDATE_JSON")
          if [ -z "$CANDIDATE_URL" ] || [ -z "$NEW_REVISION" ]; then
            echo "Candidate worker revision could not be resolved."
            exit 1
          fi
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="$WORKER_URL")
          for _ in $(seq 1 30); do
            if curl --fail --silent \
              --header "Authorization: Bearer $ID_TOKEN" \
              "$CANDIDATE_URL/health" >/dev/null; then
              candidate_healthy=true
              break
            fi
            sleep 2
          done
          if [ "${candidate_healthy:-false}" != "true" ]; then
            gcloud run services logs read "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
              --project="${{ env.PROJECT_ID }}" \
              --region="${{ env.GAR_LOCATION }}" \
              --limit=50 || true
            exit 1
          fi

          gcloud run services update-traffic "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --to-revisions="$NEW_REVISION=100" \
            --quiet
          ID_TOKEN=$(gcloud auth print-identity-token --audiences="$WORKER_URL")
          for _ in $(seq 1 15); do
            if curl --fail --silent \
              --header "Authorization: Bearer $ID_TOKEN" \
              "$WORKER_URL/health" >/dev/null; then
              stable_healthy=true
              break
            fi
            sleep 2
          done
          if [ "${stable_healthy:-false}" != "true" ]; then
            if [ -n "$PREVIOUS_REVISION" ]; then
              gcloud run services update-traffic "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
                --project="${{ env.PROJECT_ID }}" \
                --region="${{ env.GAR_LOCATION }}" \
                --to-revisions="$PREVIOUS_REVISION=100" \
                --quiet
            fi
            exit 1
          fi

      - name: Repair existing worker scheduler authentication
        run: |
          set -euo pipefail
          JOB_ID="icore-g2b-scraper-job-1"
          WORKER_URL=$(gcloud run services describe "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --format='value(status.url)')
          INVOKER_SERVICE_ACCOUNT="icore-scheduler@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          gcloud run services add-iam-policy-binding "${{ env.CLOUD_RUN_WORKER_SERVICE }}" \
            --project="${{ env.PROJECT_ID }}" \
            --region="${{ env.GAR_LOCATION }}" \
            --member="serviceAccount:$INVOKER_SERVICE_ACCOUNT" \
            --role="roles/run.invoker" \
            --quiet
          if gcloud scheduler jobs describe "$JOB_ID" \
            --project="${{ env.PROJECT_ID }}" \
            --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" >/dev/null 2>&1; then
            gcloud scheduler jobs update http "$JOB_ID" \
              --project="${{ env.PROJECT_ID }}" \
              --location="${{ env.CLOUD_SCHEDULER_LOCATION }}" \
              --uri="$WORKER_URL/run" \
              --http-method=POST \
              --oidc-service-account-email="$INVOKER_SERVICE_ACCOUNT" \
              --oidc-token-audience="$WORKER_URL"
          fi

name: back-ci-cd

on:
  push:
    branches:
      - back
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast3 
  REPOSITORY: icore-docker-repo
  IMAGE_NAME: icore-back
  SCRAPER_IMAGE_NAME: icore-scraper
  CLOUD_RUN_SCRAPER_SERVICE: icore-g2b-scraper
  CLOUD_SCHEDULER_LOCATION: asia-northeast3
  CLOUD_SCHEDULER_JOB_ID: icore-g2b-scraper-job
  CLOUD_SCHEDULER_TIMEZONE: Asia/Seoul

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        run: python -c "import main; print(main.app.title)"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE_PATH:${{ github.sha }} .
          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:latest

      - name: Push Docker image to Artifact Registry
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:latest

  deploy-cloudrun-scraper:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/back'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push scraper image
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SCRAPER_IMAGE_NAME }}
          docker build -f Dockerfile.cloudrun-scraper -t $IMAGE_PATH:${{ github.sha }} .
          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:latest
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:latest

      - name: Deploy scraper to Cloud Run
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SCRAPER_IMAGE_NAME }}
          GSHEET_SA_JSON_COMPACT="$(echo '${{ secrets.GSHEET_SERVICE_ACCOUNT_JSON }}' | tr -d '\r\n')"
          GMAIL_SA_JSON_COMPACT="$(echo '${{ secrets.GMAIL_SERVICE_ACCOUNT_JSON }}' | tr -d '\r\n')"

          gcloud run deploy ${{ env.CLOUD_RUN_SCRAPER_SERVICE }} \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.GAR_LOCATION }} \
            --platform=managed \
            --allow-unauthenticated \
            --image=$IMAGE_PATH:${{ github.sha }} \
            --service-account=cloud-run-call@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="BACKEND_INTERNAL_BASE_URL=${{ secrets.BACKEND_INTERNAL_BASE_URL }}" \
            --set-env-vars="SCRAPER_INTERNAL_TOKEN=${{ secrets.SCRAPER_INTERNAL_TOKEN }}" \
            --set-env-vars="G2B_SOURCE_URL=${{ secrets.G2B_SOURCE_URL }}" \
            --set-env-vars="GSHEET_ID=${{ secrets.GSHEET_ID }}" \
            --set-env-vars="GSHEET_SERVICE_ACCOUNT_JSON=${GSHEET_SA_JSON_COMPACT}" \
            --set-env-vars="GSHEET_TAB_NAME=나라장터 공고 수집 목록" \
            --set-env-vars="GMAIL_DELEGATED_USER=${{ secrets.GMAIL_DELEGATED_USER }}" \
            --set-env-vars="GMAIL_SERVICE_ACCOUNT_JSON=${GMAIL_SA_JSON_COMPACT}"

  deploy-vm:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/back'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            GAR_LOCATION="asia-northeast3"
            PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
            REPOSITORY="icore-docker-repo"
            IMAGE_NAME="icore-back"
            IMAGE_PATH="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}"
            DB_URL="${{ secrets.BACK_DATABASE_URL }}"

            # Container 내부 localhost는 컨테이너 자신을 가리키므로 VM Host로 치환
            DB_URL="${DB_URL/@localhost:/@host.docker.internal:}"
            DB_URL="${DB_URL/@127.0.0.1:/@host.docker.internal:}"

            # Artifact Registry 인증 (VM에 gcloud가 설치되어 있어야 함)
            gcloud auth configure-docker ${GAR_LOCATION}-docker.pkg.dev --quiet

            # 최신 이미지 풀 및 컨테이너 교체
            docker pull $IMAGE_PATH:${{ github.sha }}

            set +H

            docker network create icore-net || true

            docker stop icore-back || true
            docker rm icore-back || true

            docker run -d \
              --name icore-back \
              --restart unless-stopped \
              --network icore-net \
              --add-host=host.docker.internal:host-gateway \
              -p 8000:8000 \
              -e ENVIRONMENT=production \
              -e DATABASE_URL="$DB_URL" \
              -e BUCKET_ADMIN_WEB="${{ secrets.BUCKET_ADMIN_WEB }}" \
              -e BUCKET_CLIENT_WEB="${{ secrets.BUCKET_CLIENT_WEB }}" \
              -e BUCKET_MEDIA_ASSETS="${{ secrets.BUCKET_MEDIA_ASSETS }}" \
              -e BUCKET_SITE_TEMPLATES="${{ secrets.BUCKET_SITE_TEMPLATES }}" \
              -e LANDING_CDN_BASE_URL="${{ secrets.LANDING_CDN_BASE_URL }}" \
              -e CLOUD_SCHEDULER_ENABLED="true" \
              -e CLOUD_SCHEDULER_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
              -e CLOUD_SCHEDULER_LOCATION="${{ env.CLOUD_SCHEDULER_LOCATION }}" \
              -e CLOUD_SCHEDULER_JOB_ID="${{ env.CLOUD_SCHEDULER_JOB_ID }}" \
              -e CLOUD_SCHEDULER_TIMEZONE="${{ env.CLOUD_SCHEDULER_TIMEZONE }}" \
              -e CLOUD_SCHEDULER_TARGET_URL="${{ secrets.CLOUD_SCHEDULER_TARGET_URL }}" \
              -e CLOUD_SCHEDULER_INVOKER_SERVICE_ACCOUNT="${{ secrets.CLOUD_SCHEDULER_INVOKER_SERVICE_ACCOUNT }}" \
              -e SCRAPER_INTERNAL_TOKEN="${{ secrets.SCRAPER_INTERNAL_TOKEN }}" \
              -e APPS_SCRIPT_WEBHOOK_URL="${{ secrets.APPS_SCRIPT_WEBHOOK_URL }}" \
              $IMAGE_PATH:${{ github.sha }}

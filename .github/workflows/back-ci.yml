name: back-ci

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        run: python -c "import main; print(main.app.title)"

      - name: Build Docker image
        run: docker build -t icore-back:ci .

name: back-ci-cd

on:
  push:
    branches:
      - back

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GAR_LOCATION: asia-northeast3 
  REPOSITORY: icore-docker-repo
  IMAGE_NAME: icore-back

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate FastAPI app import
        run: python -c "import main; print(main.app.title)"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          docker build -t $IMAGE_PATH:${{ github.sha }} .
          docker tag $IMAGE_PATH:${{ github.sha }} $IMAGE_PATH:latest

      - name: Push Docker image to Artifact Registry
        run: |
          IMAGE_PATH=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}
          docker push $IMAGE_PATH:${{ github.sha }}
          docker push $IMAGE_PATH:latest

  deploy-vm:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/back'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on GCP VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            GAR_LOCATION="asia-northeast3"
            PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
            REPOSITORY="icore-docker-repo"
            IMAGE_NAME="icore-back"
            IMAGE_PATH="${GAR_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${IMAGE_NAME}"

            # Artifact Registry 인증 (VM에 gcloud가 설치되어 있어야 함)
            gcloud auth configure-docker ${GAR_LOCATION}-docker.pkg.dev --quiet

            # 최신 이미지 풀 및 컨테이너 교체
            docker pull $IMAGE_PATH:${{ github.sha }}

            docker network create icore-net || true

            docker stop icore-back || true
            docker rm icore-back || true

            docker stop icore-scraper || true
            docker rm icore-scraper || true

            docker run -d \
              --name icore-back \
              --restart unless-stopped \
              --network icore-net \
              -p 8000:8000 \
              -e ENVIRONMENT=production \
              -e DATABASE_URL='${{ secrets.BACK_DATABASE_URL }}' \
              -e GCS_BUCKET='${{ secrets.GCS_BUCKET }}' \
              -e LANDING_CDN_BASE_URL='${{ secrets.LANDING_CDN_BASE_URL }}' \
              -e SCRAPER_PRIVATE_API_BASE='http://icore-scraper:8081' \
              $IMAGE_PATH:${{ github.sha }}

            docker run -d \
              --name icore-scraper \
              --restart unless-stopped \
              --network icore-net \
              -p 8081:8081 \
              -e ENVIRONMENT=production \
              -e DATABASE_URL='${{ secrets.BACK_DATABASE_URL }}' \
              -e GCS_BUCKET='${{ secrets.GCS_BUCKET }}' \
              -e LANDING_CDN_BASE_URL='${{ secrets.LANDING_CDN_BASE_URL }}' \
              -e SCRAPER_PRIVATE_API_BASE='http://icore-scraper:8081' \
              $IMAGE_PATH:${{ github.sha }} \
              uvicorn main:app --host 0.0.0.0 --port 8081